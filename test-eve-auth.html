<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Online SSO 认证测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #00d4ff;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* EVE Login Button */
        .eve-login-btn {
            display: block;
            width: 100%;
            max-width: 270px;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .eve-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }
        
        .eve-login-btn img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        
        /* Status Section */
        .status-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .status-content {
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .status-success { color: #4caf50; }
        .status-error { color: #f44336; }
        .status-info { color: #00d4ff; }
        .status-pending { color: #ff9800; }
        
        /* Character Card */
        .character-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 100, 200, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }
        
        .character-card.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .character-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .character-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            background: #0a0a0a;
        }
        
        .character-name {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .character-id {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }
        
        .character-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 15px;
            border-radius: 8px;
        }
        
        .detail-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 14px;
            color: #fff;
        }
        
        /* JSON Display */
        .json-display {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-boolean { color: #569cd6; }
        
        /* Actions */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0077b6);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EVE Online SSO 认证测试</h1>
        <p class="subtitle">测试 PKCE 认证流程和 ESI API 查询</p>
        
        <!-- EVE Login Button -->
        <a href="#" class="eve-login-btn" id="eveLoginBtn" title="Login with EVE Online">
            <img src="https://web.ccpgamescdn.com/eveonlineassets/developers/eve-sso-login-black-large.png" 
                 alt="Login with EVE Online">
        </a>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在认证中...</p>
        </div>
        
        <!-- Status -->
        <div class="status-section" id="statusSection">
            <div class="status-title">状态日志</div>
            <div class="status-content" id="statusLog">
                <span class="status-info">等待认证...</span>
            </div>
        </div>
        
        <!-- Character Info -->
        <div class="character-card" id="characterCard">
            <div class="character-header">
                <img class="character-avatar" id="characterAvatar" src="" alt="Avatar">
                <div>
                    <div class="character-name" id="characterName">-</div>
                    <div class="character-id" id="characterId">-</div>
                </div>
            </div>
            
            <div class="character-details">
                <div class="detail-item">
                    <div class="detail-label">种族</div>
                    <div class="detail-value" id="race">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">血统</div>
                    <div class="detail-value" id="bloodline">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">性别</div>
                    <div class="detail-value" id="gender">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">军团ID</div>
                    <div class="detail-value" id="corporation">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">安全等级</div>
                    <div class="detail-value" id="securityStatus">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">创建日期</div>
                    <div class="detail-value" id="birthday">-</div>
                </div>
            </div>
        </div>
        
        <!-- Raw JSON -->
        <div class="json-display" id="jsonDisplay" style="display: none;"></div>
        
        <!-- Actions -->
        <div class="actions" id="actions" style="display: none;">
            <button class="btn btn-primary" id="queryLocationBtn">查询当前位置</button>
            <button class="btn btn-secondary" id="toggleJsonBtn">显示/隐藏原始 JSON</button>
            <button class="btn btn-secondary" id="logoutBtn">退出登录</button>
        </div>
    </div>

    <script src="js/services/eveAuthService.js"></script>
    <script>
        // 全局状态
        let eveAuth = null;
        let currentCharacter = null;
        
        // DOM 元素
        const eveLoginBtn = document.getElementById('eveLoginBtn');
        const loading = document.getElementById('loading');
        const statusLog = document.getElementById('statusLog');
        const characterCard = document.getElementById('characterCard');
        const jsonDisplay = document.getElementById('jsonDisplay');
        const actions = document.getElementById('actions');
        
        // 检查是否是回调页面（从 EVE SSO 直接返回）
        const urlParams = new URLSearchParams(window.location.search);
        const authCode = urlParams.get('code');
        const authState = urlParams.get('state');
        const authError = urlParams.get('error');
        
        // 如果是从 EVE SSO 直接返回到 /callback，则重定向到回调处理页面
        if ((authCode || authError) && window.location.pathname === '/callback') {
            // 重定向到回调处理页面
            const callbackUrl = new URL('callback.html', window.location.origin);
            callbackUrl.search = window.location.search;
            window.location.href = callbackUrl.toString();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            eveAuth = new EveAuthService();
            
            // 绑定登录按钮
            eveLoginBtn.addEventListener('click', handleLogin);
            
            // 绑定功能按钮
            document.getElementById('queryLocationBtn').addEventListener('click', queryLocation);
            document.getElementById('toggleJsonBtn').addEventListener('click', toggleJson);
            document.getElementById('logoutBtn').addEventListener('click', logout);
        });
        
        /**
         * 处理登录
         */
        async function handleLogin(e) {
            e.preventDefault();
            
            log('开始认证流程...', 'pending');
            loading.classList.add('show');
            eveLoginBtn.style.display = 'none';
            
            try {
                // 回调 URL 必须与 EVE Developer 配置完全匹配
                eveAuth.redirectUri = 'http://localhost:8000/callback';
                
                // 步骤 1: 生成 PKCE 参数并构建授权 URL
                log('生成 PKCE 参数...', 'info');
                const authUrl = await eveAuth.buildAuthUrl();
                
                // 存储 code_verifier 和 state 到 sessionStorage
                sessionStorage.setItem('eve_code_verifier', eveAuth.codeVerifier);
                sessionStorage.setItem('eve_state', eveAuth.state);
                
                log('打开 EVE 登录页面...', 'info');
                log(`回调 URL: ${eveAuth.redirectUri}`, 'info');
                log('正在跳转到 EVE 登录页...', 'pending');
                
                // 打开 EVE 登录窗口
                const popup = window.open(authUrl, 'eve-auth', 'width=800,height=600');
                
                // 监听回调消息
                window.addEventListener('message', handleAuthMessage);
                
            } catch (error) {
                log(`错误: ${error.message}`, 'error');
                loading.classList.remove('show');
                eveLoginBtn.style.display = 'block';
            }
        }
        
        /**
         * 处理认证消息
         */
        async function handleAuthMessage(event) {
            if (event.origin !== window.location.origin) return;
            
            if (event.data.type === 'EVE_AUTH_CALLBACK') {
                window.removeEventListener('message', handleAuthMessage);
                
                const { code, state, error } = event.data;
                
                if (error) {
                    log(`EVE SSO 错误: ${error}`, 'error');
                    loading.classList.remove('show');
                    eveLoginBtn.style.display = 'block';
                    return;
                }
                
                // 验证 state
                const savedState = sessionStorage.getItem('eve_state');
                if (state !== savedState) {
                    log('State 不匹配 - 可能存在 CSRF 攻击', 'error');
                    loading.classList.remove('show');
                    eveLoginBtn.style.display = 'block';
                    return;
                }
                
                // 恢复 code_verifier
                eveAuth.codeVerifier = sessionStorage.getItem('eve_code_verifier');
                eveAuth.state = state;
                
                log('收到授权码，换取 Token...', 'pending');
                
                try {
                    // 步骤 2: 换取 access token
                    await eveAuth.exchangeCodeForToken(code);
                    log('Access Token 获取成功', 'success');
                    
                    // 步骤 3: 获取角色信息
                    log('查询角色信息...', 'pending');
                    currentCharacter = await eveAuth.getCharacterInfo();
                    log('角色信息获取成功', 'success');
                    
                    // 显示角色信息
                    displayCharacter(currentCharacter);
                    
                    // 清理 sessionStorage
                    sessionStorage.removeItem('eve_code_verifier');
                    sessionStorage.removeItem('eve_state');
                    
                } catch (error) {
                    log(`错误: ${error.message}`, 'error');
                    loading.classList.remove('show');
                    eveLoginBtn.style.display = 'block';
                }
            }
        }
        
        /**
         * 显示角色信息
         */
        function displayCharacter(info) {
            loading.classList.remove('show');
            
            // 设置头像
            document.getElementById('characterAvatar').src = 
                `https://images.evetech.net/characters/${info.character_id}/portrait?size=128`;
            
            document.getElementById('characterName').textContent = info.name;
            document.getElementById('characterId').textContent = `ID: ${info.character_id}`;
            document.getElementById('race').textContent = getRaceName(info.race_id);
            document.getElementById('bloodline').textContent = getBloodlineName(info.bloodline_id);
            document.getElementById('gender').textContent = info.gender === 'male' ? '男性' : '女性';
            document.getElementById('corporation').textContent = info.corporation_id;
            document.getElementById('securityStatus').textContent = info.security_status?.toFixed(2) || 'N/A';
            document.getElementById('birthday').textContent = new Date(info.birthday).toLocaleDateString('zh-CN');
            
            characterCard.classList.add('show');
            actions.style.display = 'flex';
            
            // 显示原始 JSON
            displayJson(info);
        }
        
        /**
         * 查询当前位置
         */
        async function queryLocation() {
            log('查询当前位置...', 'pending');
            
            try {
                const location = await eveAuth.getCharacterLocation();
                log(`当前星系ID: ${location.solar_system_id}`, 'success');
                displayJson(location);
            } catch (error) {
                log(`查询位置失败: ${error.message}`, 'error');
            }
        }
        
        /**
         * 切换 JSON 显示
         */
        function toggleJson() {
            jsonDisplay.style.display = jsonDisplay.style.display === 'none' ? 'block' : 'none';
        }
        
        /**
         * 退出登录
         */
        function logout() {
            eveAuth = new EveAuthService();
            currentCharacter = null;
            
            characterCard.classList.remove('show');
            actions.style.display = 'none';
            jsonDisplay.style.display = 'none';
            eveLoginBtn.style.display = 'block';
            
            log('已退出登录', 'info');
        }
        
        /**
         * 显示 JSON
         */
        function displayJson(data) {
            const json = JSON.stringify(data, null, 2);
            const highlighted = json
                .replace(/"(.+?)":/g, '<span class="json-key">"$1":</span>')
                .replace(/: "(.+?)"/g, ': <span class="json-string">"$1"</span>')
                .replace(/: (\d+)/g, ': <span class="json-number">$1</span>')
                .replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>');
            
            jsonDisplay.innerHTML = `<pre>${highlighted}</pre>`;
        }
        
        /**
         * 添加日志
         */
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-CN');
            const className = `status-${type}`;
            statusLog.innerHTML += `<div><span style="color: #666">[${time}]</span> <span class="${className}">${message}</span></div>`;
        }
        
        /**
         * 获取种族名称
         */
        function getRaceName(id) {
            const races = { 1: 'Caldari', 2: 'Minmatar', 4: 'Amarr', 8: 'Gallente' };
            return races[id] || `Unknown (${id})`;
        }
        
        /**
         * 获取血统名称
         */
        function getBloodlineName(id) {
            const bloodlines = { 1: 'Deteis', 2: 'Civire', 3: 'Sebiestor', 4: 'Brutor', 
                                5: 'Amarr', 6: 'Khanid', 7: 'Gallente', 8: 'Intaki', 11: 'Achura' };
            return bloodlines[id] || `Unknown (${id})`;
        }
    </script>
</body>
</html>
