<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Regional Map - 外部星系修复版</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .version-badge { position: fixed; top: 10px; right: 10px; padding: 5px 12px;
            background: rgba(90, 199, 90, 0.3); border: 1px solid var(--accent-green);
            border-radius: 4px; font-size: 12px; color: var(--accent-green); z-index: 1000; }
        .test-btn { position: fixed; top: 45px; right: 10px; padding: 5px 12px;
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 4px; font-size: 11px; color: var(--text-primary); 
            cursor: pointer; z-index: 1000; }
        .test-btn:hover { border-color: var(--accent-blue); }
    </style>
</head>
<body>
    <div class="version-badge">外部星系修复版</div>
    <button class="test-btn" onclick="testExternalSystems()">测试外部星系</button>

    <div id="app">
        <header class="header">
            <div class="header-left">
                <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg></div>
                <div class="title-group"><h1>EVE Regional Map</h1><span class="subtitle">修复版</span></div>
            </div>
            <div class="region-selector">
                <select id="regionSelect"><option value="">选择星域...</option></select>
            </div>
            <div class="system-search">
                <input type="text" id="searchInput" placeholder="搜索星系..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="legend">
                <div class="legend-item"><span class="dot high-sec"></span><span>高安</span></div>
                <div class="legend-item"><span class="dot low-sec"></span><span>低安</span></div>
                <div class="legend-item"><span class="dot null-sec"></span><span>00区</span></div>
                <div class="legend-item"><span class="dot border"></span><span>入口</span></div>
            </div>
        </header>
        <main class="main-content">
            <div id="mapContainer" class="map-container">
                <canvas id="mapCanvas"></canvas>
                <div id="loadingMask" class="loading-mask"><div class="spinner"></div><p>加载中...</p></div>
                <div id="toast" class="toast"></div>
            </div>
            <div class="resizer" id="panelResizer"></div>
            <aside class="side-panel" id="sidePanel">
                <div class="panel-section" id="systemInfo"><h3>星系信息</h3><div class="info-content"><p class="placeholder">点击星系</p></div></div>
                <div class="panel-section" id="wormholePanel"><h3>虫洞记录</h3><div class="wormhole-table"><p class="placeholder">暂无记录</p></div></div>
                <div class="panel-section" id="pathPanel"><h3>路径记录</h3><div class="path-list"><p class="placeholder">点击星系记录路径</p></div><button onclick="window.app?.clearPath()">清除路径</button></div>
            </aside>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="js/eveScoutService.js"></script>
    
    <script type="module">
        import { RegionalMapApp } from './js/app.js';
        
        const app = new RegionalMapApp();
        window.app = app;
        
        window.testExternalSystems = () => {
            const data = app.renderer.currentData;
            if (!data) {
                alert('数据未加载');
                return;
            }
            
            const externalCount = data.externalSystems?.length || 0;
            const externalNames = data.externalSystems?.map(s => s.name).join(', ') || '无';
            
            alert(`外部星系数量: ${externalCount}\n名称: ${externalNames}`);
            console.log('External Systems:', data.externalSystems);
        };
        
        app.init().catch(err => {
            console.error('初始化失败:', err);
            alert('初始化失败: ' + err.message);
        });
    </script>
</body>
</html>
