<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Regional Map - 调试版</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .debug-panel { position: fixed; top: 10px; right: 10px; width: 300px; 
            background: var(--bg-panel); border: 1px solid var(--border-color); 
            border-radius: 4px; padding: 10px; z-index: 1000; font-size: 12px; }
        .debug-panel h4 { margin: 0 0 10px 0; color: var(--accent-blue); }
        .debug-panel button { width: 100%; margin: 4px 0; padding: 6px; 
            background: var(--bg-primary); border: 1px solid var(--border-color);
            color: var(--text-primary); border-radius: 3px; cursor: pointer; font-size: 11px; }
        .debug-panel button:hover { border-color: var(--accent-blue); }
        .debug-log { max-height: 150px; overflow-y: auto; margin-top: 10px; 
            background: #000; padding: 8px; border-radius: 3px; font-family: monospace; font-size: 10px; }
        .debug-log .info { color: #0f0; }
        .debug-log .error { color: #f00; }
        .debug-log .warn { color: #ff0; }
    </style>
</head>
<body>
    <div class="debug-panel">
        <h4>🔧 调试面板</h4>
        <button onclick="testSearch()">测试搜索功能</button>
        <button onclick="testPath()">测试路径记录</button>
        <button onclick="testWormhole()">测试虫洞检测</button>
        <button onclick="clearDebugLog()">清空日志</button>
        <button onclick="location.href='index.html'">返回原版</button>
        <div class="debug-log" id="debugLog"></div>
    </div>

    <div id="app">
        <header class="header">
            <div class="header-left">
                <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg></div>
                <div class="title-group"><h1>EVE Regional Map</h1><span class="subtitle">调试版</span></div>
            </div>
            <div class="region-selector">
                <select id="regionSelect"><option value="">选择星域...</option></select>
            </div>
            <div class="system-search">
                <input type="text" id="searchInput" placeholder="搜索星系..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="legend">
                <div class="legend-item"><span class="dot high-sec"></span><span>高安</span></div>
                <div class="legend-item"><span class="dot low-sec"></span><span>低安</span></div>
                <div class="legend-item"><span class="dot null-sec"></span><span>00区</span></div>
            </div>
        </header>
        <main class="main-content">
            <div id="mapContainer" class="map-container">
                <canvas id="mapCanvas"></canvas>
                <div id="loadingMask" class="loading-mask"><div class="spinner"></div><p>加载中...</p></div>
                <div id="toast" class="toast"></div>
            </div>
            <div class="resizer" id="panelResizer"></div>
            <aside class="side-panel" id="sidePanel">
                <div class="panel-section" id="systemInfo"><h3>星系信息</h3><div class="info-content"><p class="placeholder">点击星系</p></div></div>
                <div class="panel-section" id="wormholePanel"><h3>虫洞记录</h3><div class="wormhole-table"><p class="placeholder">暂无记录</p></div></div>
                <div class="panel-section" id="pathPanel"><h3>路径记录</h3><div class="path-list"><p class="placeholder">点击星系记录路径</p></div><button onclick="window.app?.clearPath()">清除路径</button></div>
            </aside>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="js/eveScoutService.js"></script>
    
    <script type="module">
        import { RegionalMapApp } from './js/app.js';
        
        function dlog(msg, type='info') {
            const log = document.getElementById('debugLog');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }
        
        window.dlog = dlog;
        window.clearDebugLog = () => document.getElementById('debugLog').innerHTML = '';
        
        // 启动应用
        dlog('初始化应用...');
        const app = new RegionalMapApp();
        window.app = app;
        
        app.init().then(() => {
            dlog('应用初始化完成', 'info');
            
            // 覆盖方法添加日志
            const originalSearch = app.searchManager._doSearch.bind(app.searchManager);
            app.searchManager._doSearch = function(query) {
                dlog(`搜索: "${query}"`);
                originalSearch(query);
            };
            
            const originalSelect = app.searchManager.select.bind(app.searchManager);
            app.searchManager.select = function(result) {
                dlog(`选择星系: ${result.system?.name} (ID: ${result.system?.id})`);
                originalSelect(result);
            };
            
        }).catch(err => {
            dlog('初始化失败: ' + err.message, 'error');
            console.error(err);
        });
        
        // 调试函数
        window.testSearch = () => {
            const input = document.getElementById('searchInput');
            input.value = '耶';
            input.dispatchEvent(new Event('input'));
            dlog('触发搜索输入: "耶"');
        };
        
        window.testPath = () => {
            if (!app.dataLoader.loaded) {
                dlog('数据未加载完成', 'error');
                return;
            }
            const system = app.dataLoader.systems.get(30005008);
            if (system) {
                app.pathManager.addSystem(system);
                dlog(`添加路径: ${system.name}`);
            }
        };
        
        window.testWormhole = () => {
            app.eventBus.emit('wormhole:detected', {
                fromSystem: { id: 1, name: 'TestA' },
                toSystem: { id: 2, name: 'TestB' },
                defaultType: 'K162'
            });
            dlog('发送虫洞检测事件');
        };
    </script>
</body>
</html>
